apiVersion: rbac.authorization.k8s.io/v1 
kind: Role 
metadata:
  namespace: roboshop
  name: roboshop-junior
rules:
 - apiGroups: [""]
   resources: ["pods"]
   verbs: ["get","list","watch"]
 - apiGroups: ["apps"]
   resources: ["deployments"]
   verbs: ["get","list","watch","create","update"]

--- 
apiVersion: rbac.authorization.k8s.io/v1 
kind: RoleBinding
metadata:
  namespace: roboshop
  name: roboshop-junior
subjects:
- kind: User
  name: cnu 
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: roboshop-junior
  apiGroup: rbac.authorization.k8s.io
  
